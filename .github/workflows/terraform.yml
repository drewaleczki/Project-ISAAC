name: 'Terraform CI/CD'

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest

    # Injecting environment variables dynamically from GitHub Secrets
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_VAR_kaggle_username: ${{ secrets.KAGGLE_USERNAME }}
      TF_VAR_kaggle_key: ${{ secrets.KAGGLE_KEY }}
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -no-color
        if: github.event_name == 'pull_request'
        
      # Only apply changes automatically when code is pushed to the 'master' branch
      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false

  analytics_engineering:
    name: 'dbt Analytics (Gold Layer)'
    needs: terraform
    runs-on: ubuntu-latest
    # Executes dbt solely after the refreshed Terraform infrastructure is formally instantiated on Master
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Setup Terraform (For securely retrieving Bucket outputs)
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false

      - name: Install dbt and Trino/AWS Engine
        run: pip install dbt-core dbt-athena-community

      - name: Extract S3 Gold Bucket Name via State
        run: |
          terraform init
          echo "GOLD_BUCKET=$(terraform output -raw datalake_gold_bucket)" >> $GITHUB_ENV

      - name: Execute Analytical Aggregation (dbt run & test)
        run: |
          cd dbt_project
          dbt deps
          dbt debug
          dbt run
          dbt test
        env:
          # Injecting magic dynamic variables consumed by profiles.yml Jinja engines!
          GOLD_BUCKET_NAME: ${{ env.GOLD_BUCKET }}
